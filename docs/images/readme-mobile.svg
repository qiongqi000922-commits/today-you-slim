<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720" role="img" aria-labelledby="title desc">
  <title id="title">移动端记录页面展示</title>
  <desc id="desc">展示移动端体重高低图、拍照记录、饮食记录、日历和底部页签。</desc>
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef8f2"/>
      <stop offset="100%" stop-color="#f9fbfa"/>
    </linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7eadf"/>
      <stop offset="100%" stop-color="#9cc8b5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#173c2e" flood-opacity=".16"/>
    </filter>
    <style>
      .zh{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
      .h{font-size:34px;font-weight:800;fill:#11251d}
      .t{font-size:16px;font-weight:700;fill:#63746d}
      .s{font-size:13px;font-weight:700;fill:#7a8983}
      .g{fill:#1b704f}
    </style>
  </defs>
  <rect width="900" height="720" rx="36" fill="#f2f7f4"/>
  <g filter="url(#shadow)">
    <rect x="70" y="44" width="330" height="632" rx="44" fill="#101b17"/>
    <rect x="86" y="60" width="298" height="600" rx="34" fill="url(#screen)"/>
    <rect x="176" y="72" width="116" height="25" rx="13" fill="#101b17"/>
    <text x="116" y="136" class="zh s g">今天你瘦了吗?</text>
    <circle cx="132" cy="182" r="32" fill="url(#photo)"/>
    <text x="178" y="194" class="zh h">我的记录</text>
    <rect x="108" y="236" width="254" height="154" rx="18" fill="#fff" stroke="#d8ebe2"/>
    <line x1="136" y1="354" x2="342" y2="354" stroke="#e2ede8" stroke-width="2"/>
    <line x1="136" y1="315" x2="342" y2="315" stroke="#e2ede8" stroke-width="2"/>
    <line x1="136" y1="276" x2="342" y2="276" stroke="#e2ede8" stroke-width="2"/>
    <line x1="170" y1="340" x2="170" y2="304" stroke="#568f76" stroke-width="11" stroke-linecap="round"/>
    <line x1="214" y1="333" x2="214" y2="288" stroke="#568f76" stroke-width="11" stroke-linecap="round"/>
    <line x1="258" y1="358" x2="258" y2="318" stroke="#cf8b79" stroke-width="11" stroke-linecap="round"/>
    <line x1="302" y1="326" x2="302" y2="286" stroke="#568f76" stroke-width="11" stroke-linecap="round"/>
    <rect x="108" y="414" width="121" height="74" rx="18" fill="#fff" stroke="#d8ebe2"/>
    <text x="128" y="446" class="zh t" fill="#11251d">拍照记录</text>
    <text x="128" y="470" class="zh s">体重与心情</text>
    <rect x="241" y="414" width="121" height="74" rx="18" fill="#f8fbf0" stroke="#e4eacb"/>
    <text x="261" y="446" class="zh t" fill="#11251d">食物记录</text>
    <text x="261" y="470" class="zh s">营养估算</text>
    <rect x="108" y="510" width="254" height="78" rx="20" fill="#fff" stroke="#d8ebe2"/>
    <text x="130" y="540" class="zh t" fill="#11251d">体重涨跌日历</text>
    <g fill="#edf5f1" stroke="#d9e9e1">
      <rect x="132" y="558" width="28" height="14" rx="7"/>
      <rect x="166" y="558" width="28" height="14" rx="7"/>
      <rect x="200" y="558" width="28" height="14" rx="7"/>
      <rect x="234" y="558" width="28" height="14" rx="7"/>
      <rect x="268" y="558" width="28" height="14" rx="7"/>
      <rect x="302" y="558" width="28" height="14" rx="7"/>
    </g>
    <rect x="86" y="596" width="298" height="64" rx="0" fill="#fff" opacity=".98"/>
    <text x="132" y="636" class="zh s g">我的</text>
    <text x="224" y="636" class="zh s">社区</text>
    <text x="316" y="636" class="zh s">设置</text>
  </g>
  <g class="zh">
    <text x="470" y="145" class="h">移动端优先体验</text>
    <text x="472" y="186" class="t">围绕日常记录设计，入口清晰，趋势和历史记录在同一屏里快速浏览。</text>
    <rect x="472" y="236" width="330" height="70" rx="18" fill="#fff" stroke="#d8ebe2"/>
    <text x="500" y="268" class="t" fill="#11251d">体重高低图</text>
    <text x="500" y="292" class="s">默认选中最近一天，点击查看最高/最低</text>
    <rect x="472" y="326" width="330" height="70" rx="18" fill="#fff" stroke="#d8ebe2"/>
    <text x="500" y="358" class="t" fill="#11251d">拍照与回放</text>
    <text x="500" y="382" class="s">照片、体重和心情同步回放</text>
    <rect x="472" y="416" width="330" height="70" rx="18" fill="#fff" stroke="#d8ebe2"/>
    <text x="500" y="448" class="t" fill="#11251d">饮食记录</text>
    <text x="500" y="472" class="s">一张图可识别多个食物并估算营养</text>
  </g>
</svg>
